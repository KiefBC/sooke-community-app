name: SookeCommunity
options:
  bundleIdPrefix: com.kiefbc
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.3"
    DEVELOPMENT_TEAM: ""

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.0.0"

schemes:
  SookeCommunity:
    build:
      targets:
        SookeCommunity: all
        SookeCommunityTests: [test]
    test:
      targets:
        - SookeCommunityTests

targets:
  SookeCommunity:
    type: application
    platform: iOS
    sources:
      - SookeCommunity
    settings:
      base:
        INFOPLIST_FILE: SookeCommunity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kiefbc.sookecommunity
    dependencies:
      - package: Kingfisher
    info:
      path: SookeCommunity/Info.plist
      properties:
        CFBundleDisplayName: Sooke Community
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}

  SookeCommunityTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SookeCommunityTests
    dependencies:
      - target: SookeCommunity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiefbc.sookecommunity.tests
        GENERATE_INFOPLIST_FILE: YES
