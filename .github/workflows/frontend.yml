name: Frontend CI

on:
  push:
    paths:
      - "my-app/**"
  pull_request:
    paths:
      - "my-app/**"

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: my-app/package.json
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
